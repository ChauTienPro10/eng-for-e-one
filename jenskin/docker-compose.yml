version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    # restart: always
    ports:
      - "8070:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
    networks:
      - main-net


volumes:
  jenkins_home:

networks:
  main-net:
    external: true
 