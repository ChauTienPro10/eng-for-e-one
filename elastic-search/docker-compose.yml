version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false # Tắt mật khẩu/SSL để kết nối nhanh ở local
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # Giới hạn RAM (512MB), tăng lên nếu dữ liệu lớn
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - main-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.2
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200 # Trỏ trực tiếp sang container elastic
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch # Chờ Elasticsearch khởi động trước
    networks:
      - main-net

volumes:
  es_data:
    driver: local

networks:
  main-net:
    external: true